name: achados_da_cidade
description: "Achados da Cidade é o seu mapa interativo para o aplicativo."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^14.0.0
  shared_preferences: ^2.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  intl: ^0.19.0
  uuid: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/dreamflow_icon.jpg"
  remove_alpha_ios: false
